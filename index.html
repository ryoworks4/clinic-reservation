<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI予約フォーム | クリニック向けAIツール</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>AI予約フォーム</h1>
    <p>症状からAIが最適な診療科を提案し、予約内容を整理します</p>
</header>

<main>
    <div class="container">
        <!-- 患者情報 -->
        <div class="form-section">
            <h2 class="section-label">患者情報</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="name-input">お名前</label>
                    <input type="text" id="name-input" placeholder="山田 太郎" maxlength="50">
                </div>
                <div class="form-group">
                    <label for="age-input">年齢</label>
                    <input type="number" id="age-input" placeholder="45" min="0" max="120">
                </div>
            </div>
            <div class="form-group">
                <label>性別</label>
                <div class="gender-buttons">
                    <button class="gender-btn active" data-gender="male">男性</button>
                    <button class="gender-btn" data-gender="female">女性</button>
                    <button class="gender-btn" data-gender="other">その他</button>
                </div>
            </div>
        </div>

        <!-- 症状入力 -->
        <div class="form-section">
            <h2 class="section-label">症状・相談内容</h2>
            <textarea id="symptom-input" rows="4" maxlength="500" placeholder="例: 2日前から頭痛がひどく、市販薬が効きません。吐き気もあります。"></textarea>
            <div class="char-count"><span id="char-count">0</span> / 500</div>
        </div>

        <!-- 希望日時 -->
        <div class="form-section">
            <h2 class="section-label">希望日時</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="date-input">希望日</label>
                    <input type="date" id="date-input">
                </div>
                <div class="form-group">
                    <label>希望時間帯</label>
                    <div class="time-buttons">
                        <button class="time-btn active" data-time="morning">午前</button>
                        <button class="time-btn" data-time="afternoon">午後</button>
                        <button class="time-btn" data-time="any">どちらでも</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- サンプル -->
        <div class="examples">
            <p class="examples-label">症状の入力例（クリックで入力）</p>
            <div class="example-tags">
                <button class="example-tag">2日前から頭痛がひどく吐き気もある</button>
                <button class="example-tag">健康診断で血糖値が高いと言われた</button>
                <button class="example-tag">子どもが3日前から咳と鼻水が続いている</button>
                <button class="example-tag">膝が痛くて階段の上り下りがつらい</button>
            </div>
        </div>

        <!-- 生成ボタン -->
        <button id="generate-btn" class="primary-btn">AIで予約内容を整理する</button>

        <!-- 結果表示 -->
        <div class="output-section">
            <div id="result-area" class="result-area">
                <p class="placeholder-text">情報を入力して「AIで予約内容を整理する」を押してください</p>
            </div>
            <button id="copy-btn" class="copy-btn" style="display:none;">コピー</button>
        </div>
    </div>

    <!-- 使い方 -->
    <div class="how-to-use">
        <h2>使い方</h2>
        <div class="steps">
            <div class="step">
                <div class="step-number">1</div>
                <p>患者情報と症状を入力</p>
            </div>
            <div class="step">
                <div class="step-number">2</div>
                <p>AIが診療科を提案</p>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <p>予約サマリーを生成</p>
            </div>
        </div>
    </div>
</main>

<footer>
    <p>※ このツールはデモ版です。実際の予約は行われません</p>
    <p>※ 診療科の提案はAIによる参考情報です。最終判断は医療機関にお問い合わせください</p>
    <p>&copy; 2025 RyoWorks</p>
</footer>

<script src="script.js"></script>
</body>
</html>
